services:
  postgres:
    image: postgres:17-alpine
    container_name: oidea-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: oidea
      POSTGRES_PASSWORD: oidea_secret_dev
      POSTGRES_DB: oidea
    # 避免與本機或其他專案（常見為 5432 上的 postgres）衝突
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oidea"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: oidea-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: oidea-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: oidea_minio
      MINIO_ROOT_PASSWORD: oidea_minio_secret_dev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  minio_data:
