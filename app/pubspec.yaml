name: oidea
description: Oidea 協作平台（通訊、專案、會議、白板）
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.0
  dio: ^5.8.0
  socket_io_client: ^3.0.2
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0
  badges: ^3.1.2
  photo_view: ^0.15.0
  image_picker: ^1.1.2
  file_picker: ^9.2.1
  table_calendar: ^3.2.0
  uuid: ^4.5.1
  flutter_webrtc: ^0.12.7
  intl: ^0.20.2
  url_launcher: ^6.3.1
  timeago: ^3.7.1
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  freezed: ^2.5.7
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true
