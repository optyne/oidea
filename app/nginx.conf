server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Flutter 的靜態檔（main.dart.js、canvaskit、assets）可以長快取，檔名帶 hash
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /canvaskit/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~ \.(js|js\.map|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html 每次都重新拿，避免放出舊版後用戶卡在舊 JS hash
    location = /index.html {
        expires 0;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location = /flutter_service_worker.js {
        expires 0;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # SPA fallback：所有 non-file 請求都送 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 壓縮
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml font/woff font/woff2;
    gzip_min_length 1024;

    # 安全性 headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
